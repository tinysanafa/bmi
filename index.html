<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人健康管理 - BMI 計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        .transition-all {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="card w-full max-w-md p-8 transition-all">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">BMI 健康計算機</h1>
            <p class="text-gray-500 mt-2">輸入數據，誠實面對身體狀態</p>
        </header>

        <div class="space-y-6">
            <!-- 身高輸入 -->
            <div>
                <label for="height" class="block text-sm font-medium text-gray-700 mb-1">身高 (cm)</label>
                <input type="number" id="height" placeholder="例如: 175" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl transition-all">
            </div>

            <!-- 體重輸入 -->
            <div>
                <label for="weight" class="block text-sm font-medium text-gray-700 mb-1">體重 (kg)</label>
                <input type="number" id="weight" placeholder="例如: 70" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl transition-all">
            </div>

            <!-- 計算按鈕 -->
            <button onclick="calculateBMI()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all">
                開始計算
            </button>
        </div>

        <!-- 結果顯示區域 -->
        <div id="resultBox" class="mt-8 p-6 rounded-2xl hidden transition-all">
            <div class="text-center">
                <span class="text-sm font-semibold uppercase tracking-wide text-gray-500">你的 BMI 數值</span>
                <div id="bmiValue" class="text-5xl font-black my-2">0.0</div>
                <div id="bmiStatus" class="text-lg font-bold">--</div>
            </div>
            <div id="advice" class="mt-4 text-sm text-gray-600 leading-relaxed border-t border-gray-200 pt-4 italic">
                <!-- 飲食建議會顯示在這裡 -->
            </div>
        </div>

        <!-- 錯誤提示 -->
        <div id="errorBox" class="mt-4 p-4 bg-red-50 text-red-700 text-sm rounded-xl hidden text-center">
            請輸入正確的身高與體重數值。
        </div>
    </div>

    <script>
        function calculateBMI() {
            const heightCm = parseFloat(document.getElementById('height').value);
            const weightKg = parseFloat(document.getElementById('weight').value);
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');
            const bmiValueEl = document.getElementById('bmiValue');
            const bmiStatusEl = document.getElementById('bmiStatus');
            const adviceEl = document.getElementById('advice');

            // 隱藏之前的結果
            resultBox.classList.add('hidden');
            errorBox.classList.add('hidden');

            if (!heightCm || !weightKg || heightCm <= 0 || weightKg <= 0) {
                errorBox.classList.remove('hidden');
                return;
            }

            const heightM = heightCm / 100;
            const bmi = (weightKg / (heightM * heightM)).toFixed(1);

            bmiValueEl.innerText = bmi;
            resultBox.classList.remove('hidden');

            let status = "";
            let colorClass = "";
            let advice = "";

            if (bmi < 18.5) {
                status = "體重過輕";
                colorClass = "bg-blue-50 text-blue-700";
                advice = "雖然你正在進行飲食控制，但目前體重偏低，請確保攝取足夠的蛋白質，不要盲目節食。";
            } else if (bmi >= 18.5 && bmi < 24) {
                status = "健康體位";
                colorClass = "bg-green-50 text-green-700";
                advice = "維持得很好。繼續保持「不吃甜食、不吃高熱量食物」的習慣，這是對身體最誠實的愛護。";
            } else if (bmi >= 24 && bmi < 27) {
                status = "體重過重";
                colorClass = "bg-yellow-50 text-yellow-700";
                advice = "注意！身體開始發出警訊。請嚴格執行你的飲食計劃，杜絕任何隱藏的糖分與加工食品。";
            } else {
                status = "肥胖";
                colorClass = "bg-red-50 text-red-700";
                advice = "數據不會騙人。這已經對健康造成負擔，請務必堅持飲食控制，遠離高熱量食物，並增加運動量。";
            }

            // 更新介面
            resultBox.className = `mt-8 p-6 rounded-2xl transition-all ${colorClass}`;
            bmiStatusEl.innerText = status;
            adviceEl.innerText = advice;
        }
    </script>
</body>
</html>
